name: CI

on:
  push:
    branches:
      - main
      - "claude/**"
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  # Pin the toolchain to a known major so a `latest-stable` jump (e.g. to a new Xcode with
  # source-breaking changes) can't turn a green main red without a deliberate bump here.
  XCODE_VERSION: "16"

jobs:
  build-test:
    name: Build & test (macOS)
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode ${{ env.XCODE_VERSION }}
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: ${{ env.XCODE_VERSION }}

      - name: Toolchain versions
        run: |
          swift --version
          xcodebuild -version

      - name: Cache SwiftPM build
        uses: actions/cache@v4
        with:
          path: |
            .build
            ~/Library/org.swift.swiftpm
          # Key on the resolved dependency graph (`v2` salt escapes earlier poisoned caches). NO
          # restore-keys: SwiftPM's `.build/artifacts` (Sparkle's binary xcframework) is specific to
          # the resolved graph, so restoring a `.build` from a *different* Package.resolved leaves a
          # stale artifact layout and the build fails with "XCFramework Info.plist not found". Restore
          # only on an exact Package.swift+Package.resolved match; otherwise build fresh.
          key: spm-v2-${{ runner.os }}-${{ env.XCODE_VERSION }}-${{ hashFiles('Package.swift', 'Package.resolved') }}

      # Self-heal a poisoned cache: a cancelled run can persist a `.build` whose Sparkle binary
      # artifact is only half-extracted, which then fails every restore with
      # "XCFramework Info.plist not found". The `restore-keys` fallback can resurrect such a cache
      # even after the exact-key one is deleted, so guard the build: if Sparkle's xcframework is
      # missing, drop the extracted artifacts and let `swift build` re-fetch it cleanly (the
      # compiled-module cache is kept).
      - name: Heal partial Sparkle artifact
        run: |
          plist=".build/artifacts/sparkle/Sparkle/Sparkle.xcframework/Info.plist"
          if [ -d .build ] && [ ! -f "$plist" ]; then
            echo "::warning::Sparkle xcframework missing in restored cache — clearing .build/artifacts for a clean re-fetch"
            rm -rf .build/artifacts
          fi

      # Compiles every target, including the AppKit `HarnessApp` executable target,
      # so a green build proves the GUI code compiles too.
      - name: Build (debug)
        run: swift build

      # Release build catches release-only breakage the debug build can't — `assert`/`#if DEBUG`
      # code paths drop out, optimizer-sensitive code compiles, and the benchmarks/release config
      # are exercised. This guards the renderer/engine release-safety hardening (clamp-not-trap).
      - name: Build (release)
        run: swift build -c release

      # All eight suites (Core / Engine / CopyMode / Theme / Renderer / Kit / Daemon).
      # Renderer tests run offscreen, which is fine on a headless runner.
      - name: Test
        run: swift test

  live-daemon-tests:
    name: Live daemon tests (socket / PTY / security)
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode ${{ env.XCODE_VERSION }}
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: ${{ env.XCODE_VERSION }}

      - name: Cache SwiftPM build
        uses: actions/cache@v4
        with:
          path: |
            .build
            ~/Library/org.swift.swiftpm
          # See build-test: exact-match only (no cross-resolution restore-keys), `v2` salt.
          key: spm-v2-live-${{ runner.os }}-${{ env.XCODE_VERSION }}-${{ hashFiles('Package.swift', 'Package.resolved') }}

      # Self-heal a poisoned cache (see the build-test job): drop a half-extracted Sparkle artifact
      # so `swift build` re-fetches it cleanly instead of failing on a missing xcframework.
      - name: Heal partial Sparkle artifact
        run: |
          plist=".build/artifacts/sparkle/Sparkle/Sparkle.xcframework/Info.plist"
          if [ -d .build ] && [ ! -f "$plist" ]; then
            echo "::warning::Sparkle xcframework missing in restored cache — clearing .build/artifacts for a clean re-fetch"
            rm -rf .build/artifacts
          fi

      # The socket/PTY/security round-trip suites (DaemonRoundTrip, RealPtyLifecycle, contention,
      # hook-firing) are gated behind HARNESS_LIVE_DAEMON_TESTS and therefore NEVER run in the default
      # `swift test`. Run the full suite with the gate ON here so those live tests — spawning a real
      # shell + Unix socket and checking the daemon's IPC, reconnect, and peer-credential paths — are
      # actually exercised in CI.
      - name: Live daemon tests
        env:
          HARNESS_LIVE_DAEMON_TESTS: "1"
        run: swift test

  lint:
    name: Format lint (advisory)
    runs-on: macos-15
    # Style only — never block a merge on formatting. Surfaces drift for a human to clean up.
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode ${{ env.XCODE_VERSION }}
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: ${{ env.XCODE_VERSION }}

      - name: swift-format lint
        run: |
          # `swift format` ships with the toolchain; lint (don't rewrite) the first-party sources.
          swift format lint --recursive --parallel \
            Apps Packages Tools Tests Package.swift || true

  benchmarks:
    name: Benchmarks (non-blocking)
    runs-on: macos-15
    # Perf baselines are informational here; never block a merge on runner variance.
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode ${{ env.XCODE_VERSION }}
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: ${{ env.XCODE_VERSION }}

      - name: Run benchmark suite
        env:
          HARNESS_BENCHMARKS: "1"
        run: swift test -c release --filter HarnessBenchmarks
