name: CI

on:
  push:
    branches:
      - main
      - "claude/**"
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  # Pin the toolchain to a known minor so a `latest-stable` jump (e.g. to a new Xcode with
  # source-breaking changes) can't turn a green main red without a deliberate bump here.
  # Deliberately pinned to a full minor version (not just "16") so the runner picks the
  # exact SDK we tested against. Bump intentionally when adopting new language/SDK features.
  XCODE_VERSION: "16.3"

jobs:
  build-test:
    name: Build & test (macOS)
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode ${{ env.XCODE_VERSION }}
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: ${{ env.XCODE_VERSION }}

      - name: Toolchain versions
        run: |
          swift --version
          xcodebuild -version

      - name: Cache SwiftPM build
        uses: actions/cache@v4
        with:
          path: |
            .build
            ~/Library/org.swift.swiftpm
          # Key on the resolved dependency graph (`v2` salt escapes earlier poisoned caches). NO
          # restore-keys: SwiftPM's `.build/artifacts` (Sparkle's binary xcframework) is specific to
          # the resolved graph, so restoring a `.build` from a *different* Package.resolved leaves a
          # stale artifact layout and the build fails with "XCFramework Info.plist not found". Restore
          # only on an exact Package.swift+Package.resolved match; otherwise build fresh.
          key: spm-v2-${{ runner.os }}-${{ env.XCODE_VERSION }}-${{ hashFiles('Package.swift', 'Package.resolved') }}

      # Self-heal a poisoned cache: a cancelled run can persist a `.build` whose Sparkle binary
      # artifact is only half-extracted, which then fails every restore with
      # "XCFramework Info.plist not found". The `restore-keys` fallback can resurrect such a cache
      # even after the exact-key one is deleted, so guard the build: if Sparkle's xcframework is
      # missing, drop the extracted artifacts and let `swift build` re-fetch it cleanly (the
      # compiled-module cache is kept).
      - name: Heal partial Sparkle artifact
        run: |
          plist=".build/artifacts/sparkle/Sparkle/Sparkle.xcframework/Info.plist"
          if [ -d .build ] && [ ! -f "$plist" ]; then
            echo "::warning::Sparkle xcframework missing in restored cache — clearing .build/artifacts for a clean re-fetch"
            rm -rf .build/artifacts
          fi

      # Compiles every target, including the AppKit `HarnessApp` executable target,
      # so a green build proves the GUI code compiles too.
      - name: Build (debug)
        run: swift build

      # Release build catches release-only breakage the debug build can't — `assert`/`#if DEBUG`
      # code paths drop out, optimizer-sensitive code compiles, and the benchmarks/release config
      # are exercised. This guards the renderer/engine release-safety hardening (clamp-not-trap).
      - name: Build (release)
        run: swift build -c release

      # All eight suites (Core / Engine / CopyMode / Theme / Renderer / Kit / Daemon).
      # Renderer tests run offscreen, which is fine on a headless runner.
      # --enable-code-coverage instruments the test binary so SPM emits per-target .json
      # coverage files under .build/<triple>/debug/codecov/. No floor gate is enforced yet
      # (no stable baseline exists); the artifact below archives the data for trend tracking.
      - name: Test
        run: swift test --enable-code-coverage

      - name: Upload coverage data
        uses: actions/upload-artifact@v4
        with:
          name: coverage-macos
          # SPM writes coverage JSON into .build/<triple>/debug/codecov/. The triple varies
          # (arm64-apple-macosx14.0, x86_64-apple-macosx12.0, …) so we glob for the directory
          # regardless of the exact architecture/OS suffix.
          path: .build/*/debug/codecov/*.json
          if-no-files-found: warn

  linux-build-test:
    name: Build & test (Linux, headless daemon)
    runs-on: ubuntu-latest
    container: swift:6.0
    steps:
      - uses: actions/checkout@v4

      - name: Toolchain versions
        run: swift --version

      # On Linux the manifest drops the AppKit/Metal/SwiftUI targets (HarnessApp, renderer, kit,
      # onboarding, Sparkle). This builds the headless daemon + CLI + the pure libraries, proving the
      # daemon runs on a remote/headless box. A green build here is what makes issue #16 possible.
      - name: Build (debug)
        run: swift build

      - name: Build (release)
        run: swift build -c release

      # Deterministic suites (Core / Engine / CopyMode / Theme / CLI / Daemon) plus the live PTY /
      # socket / scrollback-persistence round-trips, which run fine in the Linux container.
      # The plain `swift test` run was removed: `HARNESS_LIVE_DAEMON_TESTS=1` subsumes it —
      # the gated tests skip-unless-env, so deterministic tests run either way, and there is
      # no value in running deterministic tests twice in the same job.
      - name: Live daemon tests
        env:
          HARNESS_LIVE_DAEMON_TESTS: "1"
        run: swift test

  live-daemon-tests:
    name: Live daemon tests (socket / PTY / security)
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode ${{ env.XCODE_VERSION }}
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: ${{ env.XCODE_VERSION }}

      - name: Cache SwiftPM build
        uses: actions/cache@v4
        with:
          path: |
            .build
            ~/Library/org.swift.swiftpm
          # See build-test: exact-match only (no cross-resolution restore-keys), `v2` salt.
          key: spm-v2-live-${{ runner.os }}-${{ env.XCODE_VERSION }}-${{ hashFiles('Package.swift', 'Package.resolved') }}

      # Self-heal a poisoned cache (see the build-test job): drop a half-extracted Sparkle artifact
      # so `swift build` re-fetches it cleanly instead of failing on a missing xcframework.
      - name: Heal partial Sparkle artifact
        run: |
          plist=".build/artifacts/sparkle/Sparkle/Sparkle.xcframework/Info.plist"
          if [ -d .build ] && [ ! -f "$plist" ]; then
            echo "::warning::Sparkle xcframework missing in restored cache — clearing .build/artifacts for a clean re-fetch"
            rm -rf .build/artifacts
          fi

      # The socket/PTY/security round-trip suites (DaemonRoundTrip, RealPtyLifecycle, contention,
      # hook-firing) are gated behind HARNESS_LIVE_DAEMON_TESTS and therefore NEVER run in the default
      # `swift test`. Run the full suite with the gate ON here so those live tests — spawning a real
      # shell + Unix socket and checking the daemon's IPC, reconnect, and peer-credential paths — are
      # actually exercised in CI.
      - name: Live daemon tests
        env:
          HARNESS_LIVE_DAEMON_TESTS: "1"
        run: swift test

  lint:
    name: Format lint (advisory)
    runs-on: macos-15
    # Style only — never block a merge on formatting. Surfaces drift for a human to clean up.
    # Kept advisory (continue-on-error: true) because `swift format lint` operates on the full
    # tree and the current codebase has pre-existing style violations that would make this job
    # fail on every PR, breaking CI for non-style changes. Remove continue-on-error once the
    # tree is clean and violations are held at zero.
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode ${{ env.XCODE_VERSION }}
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: ${{ env.XCODE_VERSION }}

      - name: swift-format lint
        run: |
          # `swift format` ships with the toolchain; lint (don't rewrite) the first-party sources.
          swift format lint --recursive --parallel \
            Apps Packages Tools Tests Package.swift || true

  manifest-lint:
    name: Manifest version agreement
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Assert Sparkle version consistency
        run: |
          set -euo pipefail
          # Extract the Sparkle version pinned in each manifest location. The three sources must
          # agree so a version bump in one file is never silently left behind in the others.

          # Package.swift: upToNextMinor(from: "X.Y.Z")
          pkg_ver=$(grep -oP 'upToNextMinor\(from:\s*"\K[0-9]+\.[0-9]+\.[0-9]+' Package.swift | head -1)

          # project.yml (xcodegen): `minorVersion: X.Y.Z` (upToNextMinor — must mirror
          # Package.swift's .upToNextMinor) or a legacy `from: X.Y.Z` if someone reverts the key.
          yml_ver=$(grep -oP '(minorVersion|from):\s*\K[0-9]+\.[0-9]+\.[0-9]+' project.yml 2>/dev/null | head -1 || echo "absent")

          # Harness.xcodeproj/project.pbxproj: minimumVersion = X.Y.Z
          pbx_ver=$(grep -oP 'minimumVersion = \K[0-9]+\.[0-9]+\.[0-9]+' Harness.xcodeproj/project.pbxproj 2>/dev/null | head -1 || echo "absent")

          echo "Package.swift Sparkle version : ${pkg_ver}"
          echo "project.yml   Sparkle version : ${yml_ver}"
          echo "project.pbxproj minimumVersion: ${pbx_ver}"

          ok=1
          if [ "${yml_ver}" != "absent" ] && [ "${pkg_ver}" != "${yml_ver}" ]; then
            echo "ERROR: Package.swift (${pkg_ver}) and project.yml (${yml_ver}) disagree on Sparkle version" >&2
            ok=0
          fi
          if [ "${pbx_ver}" != "absent" ] && [ "${pkg_ver}" != "${pbx_ver}" ]; then
            echo "ERROR: Package.swift (${pkg_ver}) and project.pbxproj (${pbx_ver}) disagree on Sparkle version" >&2
            ok=0
          fi
          if [ "${ok}" -eq 0 ]; then
            echo "Bump all three files to the same version to fix this." >&2
            exit 1
          fi
          echo "Sparkle version consistent across manifests: ${pkg_ver}"

  benchmarks:
    name: Benchmarks (non-blocking)
    runs-on: macos-15
    # Perf baselines are informational here; never block a merge on runner variance.
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode ${{ env.XCODE_VERSION }}
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: ${{ env.XCODE_VERSION }}

      - name: Run benchmark suite
        env:
          HARNESS_BENCHMARKS: "1"
        # tee the output to a JSON file so we can archive it as an artifact for trend tracking.
        # swift test doesn't emit structured JSON natively here, so we capture the full log;
        # the benchmarks themselves write JSON lines to stdout (see the benchmark runner).
        # mkdir: tee opens its file before swift test creates .build on a cold cache.
        # pipefail: without it the tee pipe would mask a benchmark failure.
        run: |
          set -o pipefail
          mkdir -p .build
          swift test -c release --filter HarnessBenchmarks 2>&1 | tee .build/benchmark-results.txt

      - name: Upload benchmark results
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-results
          path: .build/benchmark-results.txt
          if-no-files-found: warn
