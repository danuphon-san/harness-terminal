name: Release Harness

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to create/update, matching Info.plist (for example v1.0.4)"
        required: true
        type: string
      release_name:
        description: "GitHub release title (defaults to Harness <version>)"
        required: false
        type: string
      deploy_appcast:
        description: "Commit dist/appcast.xml to the website repository after publishing"
        required: true
        type: boolean
        default: false

concurrency:
  group: harness-release
  cancel-in-progress: false

env:
  XCODE_VERSION: "16"

jobs:
  release:
    name: Build, sign, notarize, and publish
    runs-on: macos-15
    environment: release
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Select Xcode ${{ env.XCODE_VERSION }}
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: ${{ env.XCODE_VERSION }}

      - name: Validate release inputs
        env:
          RELEASE_TAG: ${{ inputs.tag }}
        run: |
          set -euo pipefail

          if [[ ! "$RELEASE_TAG" =~ ^v[0-9]+[.][0-9]+[.][0-9]+$ ]]; then
            echo "Release tag must look like vX.Y.Z; got: $RELEASE_TAG" >&2
            exit 1
          fi

          VERSION="$(/usr/libexec/PlistBuddy -c 'Print :CFBundleShortVersionString' Apps/Harness/Sources/HarnessApp/Resources/Info.plist)"
          BUILD="$(/usr/libexec/PlistBuddy -c 'Print :CFBundleVersion' Apps/Harness/Sources/HarnessApp/Resources/Info.plist)"
          EXPECTED_VERSION="${RELEASE_TAG#v}"
          if [[ "$VERSION" != "$EXPECTED_VERSION" ]]; then
            echo "Info.plist version ($VERSION) does not match release tag ($RELEASE_TAG)." >&2
            echo "Bump CFBundleShortVersionString/CFBundleVersion before running this workflow." >&2
            exit 1
          fi

          echo "RELEASE_TAG=$RELEASE_TAG" >> "$GITHUB_ENV"
          echo "APP_VERSION=$VERSION" >> "$GITHUB_ENV"
          echo "APP_BUILD=$BUILD" >> "$GITHUB_ENV"

      - name: Validate required secrets
        env:
          SIGNING_CERTIFICATE_BASE64: ${{ secrets.SIGNING_CERTIFICATE_BASE64 }}
          SIGNING_CERTIFICATE_PASSWORD: ${{ secrets.SIGNING_CERTIFICATE_PASSWORD }}
          SIGNING_IDENTITY: ${{ secrets.SIGNING_IDENTITY }}
          ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ASC_PRIVATE_KEY: ${{ secrets.ASC_PRIVATE_KEY }}
          SPARKLE_EDDSA_PRIVATE_KEY: ${{ secrets.SPARKLE_EDDSA_PRIVATE_KEY }}
        run: |
          set -euo pipefail

          missing=()
          for name in \
            SIGNING_CERTIFICATE_BASE64 \
            SIGNING_CERTIFICATE_PASSWORD \
            SIGNING_IDENTITY \
            ASC_ISSUER_ID \
            ASC_KEY_ID \
            ASC_PRIVATE_KEY \
            SPARKLE_EDDSA_PRIVATE_KEY; do
            if [[ -z "${!name:-}" ]]; then
              missing+=("$name")
            fi
          done

          if (( ${#missing[@]} > 0 )); then
            printf 'Missing required release secret(s): %s\n' "${missing[*]}" >&2
            exit 1
          fi

      - name: Validate website deploy configuration
        if: ${{ inputs.deploy_appcast }}
        env:
          WEBSITE_REPOSITORY: ${{ vars.WEBSITE_REPOSITORY }}
          WEBSITE_DEPLOY_TOKEN: ${{ secrets.WEBSITE_DEPLOY_TOKEN }}
        run: |
          set -euo pipefail
          if [[ -z "${WEBSITE_REPOSITORY:-}" || -z "${WEBSITE_DEPLOY_TOKEN:-}" ]]; then
            echo "Set release environment variable WEBSITE_REPOSITORY and secret WEBSITE_DEPLOY_TOKEN before enabling deploy_appcast." >&2
            exit 1
          fi

      - name: Cache SwiftPM build
        uses: actions/cache@v4
        with:
          path: |
            .build
            ~/Library/org.swift.swiftpm
          # Exact dependency-graph match only, `v2` salt — see ci.yml. A cross-resolution `.build`
          # restored via restore-keys carries a stale Sparkle xcframework layout and fails the build
          # ("XCFramework Info.plist not found"); a release must never break that way.
          key: spm-release-v2-${{ runner.os }}-${{ env.XCODE_VERSION }}-${{ hashFiles('Package.swift', 'Package.resolved') }}

      # Self-heal a partial Sparkle artifact in a restored cache (see ci.yml): drop .build/artifacts
      # if Sparkle's xcframework Info.plist is missing so the build re-fetches it cleanly.
      - name: Heal partial Sparkle artifact
        run: |
          plist=".build/artifacts/sparkle/Sparkle/Sparkle.xcframework/Info.plist"
          if [ -d .build ] && [ ! -f "$plist" ]; then
            echo "::warning::Sparkle xcframework missing in restored cache — clearing .build/artifacts for a clean re-fetch"
            rm -rf .build/artifacts
          fi

      - name: Import signing certificate
        env:
          SIGNING_CERTIFICATE_BASE64: ${{ secrets.SIGNING_CERTIFICATE_BASE64 }}
          SIGNING_CERTIFICATE_PASSWORD: ${{ secrets.SIGNING_CERTIFICATE_PASSWORD }}
        run: |
          set -euo pipefail

          CERT_PATH="$RUNNER_TEMP/developer-id.p12"
          KEYCHAIN_PATH="$RUNNER_TEMP/harness-release.keychain-db"
          KEYCHAIN_PASSWORD="$(openssl rand -base64 32)"

          if ! printf '%s' "$SIGNING_CERTIFICATE_BASE64" | base64 --decode > "$CERT_PATH" 2>/dev/null; then
            printf '%s' "$SIGNING_CERTIFICATE_BASE64" | base64 -D > "$CERT_PATH"
          fi

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$CERT_PATH" \
            -k "$KEYCHAIN_PATH" \
            -P "$SIGNING_CERTIFICATE_PASSWORD" \
            -T /usr/bin/codesign \
            -T /usr/bin/productsign
          security list-keychains -d user -s "$KEYCHAIN_PATH"
          security default-keychain -s "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security find-identity -v -p codesigning "$KEYCHAIN_PATH"

          echo "KEYCHAIN_PATH=$KEYCHAIN_PATH" >> "$GITHUB_ENV"

      - name: Write notarization and Sparkle keys
        env:
          ASC_PRIVATE_KEY: ${{ secrets.ASC_PRIVATE_KEY }}
          SPARKLE_EDDSA_PRIVATE_KEY: ${{ secrets.SPARKLE_EDDSA_PRIVATE_KEY }}
        run: |
          set -euo pipefail

          ASC_KEY_PATH="$RUNNER_TEMP/AuthKey.p8"
          SPARKLE_KEY_PATH="$RUNNER_TEMP/sparkle_eddsa_private_key"

          printf '%s' "$ASC_PRIVATE_KEY" > "$ASC_KEY_PATH"
          printf '%s' "$SPARKLE_EDDSA_PRIVATE_KEY" > "$SPARKLE_KEY_PATH"
          chmod 600 "$ASC_KEY_PATH" "$SPARKLE_KEY_PATH"

          echo "ASC_KEY_PATH=$ASC_KEY_PATH" >> "$GITHUB_ENV"
          echo "SPARKLE_KEY_PATH=$SPARKLE_KEY_PATH" >> "$GITHUB_ENV"

      - name: Build Harness.app
        run: make release

      - name: Verify release package contents
        run: |
          set -euo pipefail
          stale_bundles="$(find Harness.app/Contents/Resources -maxdepth 1 -name '*.bundle' -print)"
          if [[ -n "$stale_bundles" ]]; then
            echo "Unexpected resource bundle(s) in Harness.app:" >&2
            echo "$stale_bundles" >&2
            exit 1
          fi

      - name: Sign and notarize Harness.app
        env:
          SIGNING_IDENTITY: ${{ secrets.SIGNING_IDENTITY }}
          ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
        run: ASC_KEY="$ASC_KEY_PATH" make sign

      - name: Create DMG
        run: make dmg

      - name: Create draft GitHub release if needed
        env:
          GH_TOKEN: ${{ github.token }}
          INPUT_RELEASE_NAME: ${{ inputs.release_name }}
        run: |
          set -euo pipefail

          if gh release view "$RELEASE_TAG" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            echo "GitHub release $RELEASE_TAG already exists."
            exit 0
          fi

          RELEASE_NAME="$INPUT_RELEASE_NAME"
          if [[ -z "$RELEASE_NAME" ]]; then
            RELEASE_NAME="Harness $APP_VERSION ($APP_BUILD)"
          fi

          gh release create "$RELEASE_TAG" \
            --repo "$GITHUB_REPOSITORY" \
            --target "$GITHUB_SHA" \
            --title "$RELEASE_NAME" \
            --notes "Signed and notarized Harness $APP_VERSION ($APP_BUILD)." \
            --draft

      - name: Finalize release and generate appcast
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ inputs.tag }}
          REPO: ${{ github.repository }}
          SIGNING_IDENTITY: ${{ secrets.SIGNING_IDENTITY }}
          ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
        run: |
          ASC_KEY="$ASC_KEY_PATH" \
          SPARKLE_EDDSA_PRIVATE_KEY_FILE="$SPARKLE_KEY_PATH" \
          DOWNLOAD_URL_PREFIX="https://github.com/$GITHUB_REPOSITORY/releases/download/$RELEASE_TAG/" \
          make finalize

      - name: Smoke test final DMG
        run: Scripts/smoke-dmg.sh Harness.dmg

      - name: Upload appcast to GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release upload "$RELEASE_TAG" dist/appcast.xml --repo "$GITHUB_REPOSITORY" --clobber

      - name: Checkout website repository
        if: ${{ inputs.deploy_appcast }}
        uses: actions/checkout@v4
        with:
          repository: ${{ vars.WEBSITE_REPOSITORY }}
          token: ${{ secrets.WEBSITE_DEPLOY_TOKEN }}
          path: website

      - name: Commit appcast to website repository
        if: ${{ inputs.deploy_appcast }}
        run: |
          set -euo pipefail

          mkdir -p website/public
          cp dist/appcast.xml website/public/appcast.xml

          cd website
          if git diff --quiet -- public/appcast.xml; then
            echo "Website appcast is already up to date."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add public/appcast.xml
          git commit -m "Update Harness appcast for $RELEASE_TAG"
          git push

      - name: Verify live appcast
        if: ${{ inputs.deploy_appcast }}
        run: |
          set -euo pipefail

          expected="$(shasum -a 256 dist/appcast.xml | awk '{print $1}')"
          live="$(mktemp)"
          trap 'rm -f "$live"' EXIT

          for attempt in {1..30}; do
            if curl -fsSL -H 'Cache-Control: no-cache' https://harnesscli.dev/appcast.xml -o "$live"; then
              actual="$(shasum -a 256 "$live" | awk '{print $1}')"
              if [[ "$actual" == "$expected" ]] && diff -u dist/appcast.xml "$live"; then
                grep -q "<sparkle:version>$APP_BUILD</sparkle:version>" "$live"
                grep -q "<sparkle:shortVersionString>$APP_VERSION</sparkle:shortVersionString>" "$live"
                grep -q "https://github.com/$GITHUB_REPOSITORY/releases/download/$RELEASE_TAG/Harness.dmg" "$live"
                grep -q "sparkle:edSignature=" "$live"
                echo "Live appcast matches dist/appcast.xml."
                exit 0
              fi
            fi

            echo "Live appcast has not updated yet (attempt $attempt/30); retrying..."
            sleep 10
          done

          echo "https://harnesscli.dev/appcast.xml did not match dist/appcast.xml." >&2
          echo "Expected SHA-256: $expected" >&2
          echo "Last live SHA-256: ${actual:-unavailable}" >&2
          exit 1

      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          INPUT_RELEASE_NAME: ${{ inputs.release_name }}
        run: |
          set -euo pipefail

          RELEASE_NAME="$INPUT_RELEASE_NAME"
          if [[ -z "$RELEASE_NAME" ]]; then
            RELEASE_NAME="Harness $APP_VERSION ($APP_BUILD)"
          fi

          gh release edit "$RELEASE_TAG" \
            --repo "$GITHUB_REPOSITORY" \
            --target "$GITHUB_SHA" \
            --title "$RELEASE_NAME" \
            --notes "Signed and notarized Harness $APP_VERSION ($APP_BUILD)." \
            --draft=false \
            --latest

      - name: Upload release artifacts
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: harness-release-${{ inputs.tag }}
          path: |
            Harness.dmg
            dist/appcast.xml
          if-no-files-found: ignore

      - name: Delete temporary keychain
        if: ${{ always() }}
        run: |
          if [[ -n "${KEYCHAIN_PATH:-}" ]]; then
            security delete-keychain "$KEYCHAIN_PATH" || true
          fi
